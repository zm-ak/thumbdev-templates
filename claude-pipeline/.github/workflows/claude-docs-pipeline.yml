name: Claude Code - Docs Pipeline

# ThumbDevアプリで登録した1次ドキュメント（__DOCS_PATH__/ 配下）が
# デフォルトブランチへマージされたら起動し、以下を順に実行して1本のPRとして提案する。
#   1. ドキュメントフォルダ構成整理    (claude-sonnet-5)
#   2. CLAUDE.mdの整理              (claude-sonnet-5)
#   3. プロジェクトルールの整理       (claude-sonnet-5)
#   4. リポジトリ説明の生成          (claude-haiku-4-5)
#   5. 実装計画の生成                (claude-opus-4-8)
# このPRがマージされると claude-plan-to-code.yml がコード生成を開始する。
#
# 再開の仕組み:
#   パイプラインブランチは実行のたびに新規作成するのではなく、
#   トリガー元PR番号（無ければ実行ID）から決まる固定名を使い、各ステップの完了後に都度pushする。
#   途中のステップが失敗した場合、`gh workflow run` の resume_branch 入力に
#   失敗した実行のブランチ名を指定して再実行すると、完了済みステップ（完了マーカーで判定）は
#   Claudeを起動せずスキップし、続きから再開する。
#
# 必要な設定: ANTHROPIC_API_KEY（Actions Secret）

on:
  pull_request:
    types: [closed]
    paths:
      - '__DOCS_PATH__/**'
  workflow_dispatch:
    inputs:
      resume_branch:
        description: '再開する既存のパイプラインブランチ名（例: claude/docs-pipeline-123）。未指定なら新規実行'
        required: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-docs-pipeline
  cancel-in-progress: false

env:
  PIPELINE_BRANCH: ${{ github.event.inputs.resume_branch || format('claude/docs-pipeline-{0}', github.event.pull_request.number || github.run_id) }}
  PROGRESS_DIR: .github/claude/progress/docs-pipeline
  COMMON_RULES: |
    共通ルール（必ず守ること）:
    - 現在チェックアウトされているブランチ上で作業する。ブランチの作成・切替は禁止。
    - 変更はConventional Commits形式でコミットする。push・PR作成・Issue作成は禁止。
    - 変更が不要と判断した場合はコミットせず、理由を出力して終了する。
    - リポジトリにCLAUDE.mdや開発ガイドが存在する場合はそれに従う。
    - 1次ドキュメント（__DOCS_PATH__/ 配下）の内容を根拠とし、推測で内容を発明しない。
    - このステップの作業が終わったら（変更の有無を問わず）、完了マーカーファイル
      ".github/claude/progress/docs-pipeline/<マーカー名>" を空ファイルとして作成し、コミットに含めること。
      これは再実行時にこのステップをスキップするための目印であり、削除・変更してはならない。

jobs:
  pipeline:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == github.event.repository.default_branch &&
       !startsWith(github.event.pull_request.head.ref, 'claude/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Prepare pipeline branch（既存なら再開）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "$PIPELINE_BRANCH" >/dev/null 2>&1; then
            echo "既存のパイプラインブランチを検出。再開します: $PIPELINE_BRANCH"
            git fetch origin "$PIPELINE_BRANCH"
            git checkout "$PIPELINE_BRANCH"
          else
            echo "新規パイプラインブランチを作成します: $PIPELINE_BRANCH"
            git checkout -b "$PIPELINE_BRANCH"
          fi

      - name: 完了済みステップの検出
        id: progress
        run: |
          check() {
            [ -f "$PROGRESS_DIR/$1" ] && echo true || echo false
          }
          echo "step1_done=$(check step1-organize-docs.done)" >> "$GITHUB_OUTPUT"
          echo "step2_done=$(check step2-claude-md.done)" >> "$GITHUB_OUTPUT"
          echo "step3_done=$(check step3-rules.done)" >> "$GITHUB_OUTPUT"
          echo "step4_done=$(check step4-describe-repo.done)" >> "$GITHUB_OUTPUT"
          echo "step5_done=$(check step5-implementation-plan.done)" >> "$GITHUB_OUTPUT"

      - name: 1. ドキュメントフォルダ構成整理 (sonnet)
        if: steps.progress.outputs.step1_done != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-sonnet-5
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git add:*),Bash(git commit:*),Bash(git status),Bash(git diff:*),Bash(git log:*),Bash(git mv:*)"
          prompt: |
            .github/claude/prompts/organize-docs.md を読み、その指示に従って作業すること。
            完了マーカー: ${{ env.PROGRESS_DIR }}/step1-organize-docs.done
            ${{ env.COMMON_RULES }}

      - name: 1. の進捗をpush
        if: steps.progress.outputs.step1_done != 'true'
        run: git push -u origin "$PIPELINE_BRANCH"

      - name: 2. CLAUDE.mdの整理 (sonnet)
        if: steps.progress.outputs.step2_done != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-sonnet-5
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git add:*),Bash(git commit:*),Bash(git status),Bash(git diff:*),Bash(git log:*),Bash(git mv:*)"
          prompt: |
            .github/claude/prompts/organize-claude-md.md を読み、その指示に従って作業すること。
            完了マーカー: ${{ env.PROGRESS_DIR }}/step2-claude-md.done
            ${{ env.COMMON_RULES }}

      - name: 2. の進捗をpush
        if: steps.progress.outputs.step2_done != 'true'
        run: git push -u origin "$PIPELINE_BRANCH"

      - name: 3. プロジェクトルールの整理 (sonnet)
        if: steps.progress.outputs.step3_done != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-sonnet-5
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git add:*),Bash(git commit:*),Bash(git status),Bash(git diff:*),Bash(git log:*)"
          prompt: |
            .github/claude/prompts/organize-rules.md を読み、その指示に従って作業すること。
            完了マーカー: ${{ env.PROGRESS_DIR }}/step3-rules.done
            ${{ env.COMMON_RULES }}

      - name: 3. の進捗をpush
        if: steps.progress.outputs.step3_done != 'true'
        run: git push -u origin "$PIPELINE_BRANCH"

      - name: 4. リポジトリ説明の生成 (haiku)
        if: steps.progress.outputs.step4_done != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-haiku-4-5
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git add:*),Bash(git commit:*),Bash(git status),Bash(git diff:*),Bash(git log:*)"
          prompt: |
            .github/claude/prompts/describe-repo.md を読み、その指示に従って作業すること。
            完了マーカー: ${{ env.PROGRESS_DIR }}/step4-describe-repo.done
            ${{ env.COMMON_RULES }}

      - name: 4. の進捗をpush
        if: steps.progress.outputs.step4_done != 'true'
        run: git push -u origin "$PIPELINE_BRANCH"

      - name: 5. 実装計画の生成 (opus)
        if: steps.progress.outputs.step5_done != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-opus-4-8
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git add:*),Bash(git commit:*),Bash(git status),Bash(git diff:*),Bash(git log:*)"
          prompt: |
            .github/claude/prompts/implementation-plan.md を読み、その指示に従って作業すること。
            完了マーカー: ${{ env.PROGRESS_DIR }}/step5-implementation-plan.done
            ${{ env.COMMON_RULES }}

      - name: 5. の進捗をpush
        if: steps.progress.outputs.step5_done != 'true'
        run: git push -u origin "$PIPELINE_BRANCH"

      - name: 失敗時の再開手順を出力
        if: failure()
        run: |
          echo "::warning::パイプラインが途中で失敗しました。進捗はブランチ '$PIPELINE_BRANCH' に保存済みです。"
          echo "::warning::再開するには Actions から本ワークフローを 'Run workflow' で実行し、resume_branch に '$PIPELINE_BRANCH' を指定してください。完了済みステップはスキップされます。"

      - name: Push branch and create PR
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          if [ -z "$(git log origin/$DEFAULT_BRANCH..HEAD --oneline)" ]; then
            echo "変更なしのためPRを作成しません"
            exit 0
          fi
          # 進捗マーカーはPRには不要なため、最終pushの前に取り除く
          if [ -d "$PROGRESS_DIR" ]; then
            git rm -r --quiet "$PROGRESS_DIR"
            git commit -m "chore: docs-pipelineの進捗マーカーを削除"
          fi
          git push -u origin "$PIPELINE_BRANCH"
          COMMITS=$(git log origin/$DEFAULT_BRANCH..HEAD --oneline --reverse | sed 's/^/- /')
          if gh pr view "$PIPELINE_BRANCH" --json number >/dev/null 2>&1; then
            echo "既存のPRが見つかったため作成をスキップします"
            exit 0
          fi
          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$PIPELINE_BRANCH" \
            --title "docs: 1次ドキュメントに基づくドキュメント整理と実装計画の生成" \
            --body "## 概要

          ThumbDevで登録した1次ドキュメントのマージを起点に、AIドキュメントパイプラインが以下を実行しました。

          ## 変更内容

          $COMMITS

          ## 影響範囲

          - ドキュメントのみ（アプリケーションコードは変更していません）
          - リポジトリ説明（.github/repo-description.txt。マージ後に反映されます）
          - 実装計画（docs/plan/実装計画.md）

          ## 確認内容

          - [ ] ドキュメントの内容が1次ドキュメントと整合している
          - [ ] CLAUDE.md が肥大化していない
          - [ ] 実装計画に問題がない

          ## 注意事項

          このPRを**マージすると、実装計画に従ったコード生成**（claude-plan-to-code.yml）が自動で開始されます。
          実装計画に問題がある場合はマージ前にこのPR上で修正してください。"
