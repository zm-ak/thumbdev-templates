name: Claude Code - Plan to Code

# docs pipeline のPR（claude/docs-pipeline-* ブランチ）がデフォルトブランチへマージされたら起動する。
#   1. リポジトリ説明（.github/repo-description.txt）をGitHubへ反映
#   2. docs/plan/実装計画.md に従ってタスクIssueを作成し、先頭から実装してPRを作成
#
# コスト最適化:
#   今回実装する先頭 $MAX_TASKS 件の「未着手」タスクの「規模」を実装計画から読み取り、
#   その中に「大」が1件でもあればOpus、無ければSonnetを使う。実装計画のタスクは
#   ほとんどが小・中規模のため、全実行をOpus固定にするより大幅にコストを抑えられる。
#
# 必要な設定: ANTHROPIC_API_KEY（Actions Secret）
# 任意の設定: REPO_ADMIN_TOKEN（repo権限のPAT。リポジトリ説明の自動反映、およびPR作成が許可されない場合のフォールバック用）

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-plan-to-code
  cancel-in-progress: false

jobs:
  apply-repo-description:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == github.event.repository.default_branch &&
       startsWith(github.event.pull_request.head.ref, 'claude/docs-pipeline-'))
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # リポジトリ説明の変更には Administration 権限が必要なため、GITHUB_TOKEN では失敗する。
      # 反映したい場合は repo 権限を持つ PAT を REPO_ADMIN_TOKEN シークレットへ登録する。
      - name: Apply repository description
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN || github.token }}
        run: |
          if [ ! -f .github/repo-description.txt ]; then
            echo "repo-description.txt が無いためスキップ"
            exit 0
          fi
          DESCRIPTION=$(head -n 1 .github/repo-description.txt)
          if gh repo edit "${{ github.repository }}" --description "$DESCRIPTION"; then
            echo "リポジトリ説明を反映しました"
          else
            echo "::warning::リポジトリ説明を反映できませんでした。REPO_ADMIN_TOKEN シークレット（repo権限のPAT）を設定するか、手動でAbout欄へ設定してください:"
            echo "::warning::$DESCRIPTION"
          fi

  generate-code:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == github.event.repository.default_branch &&
       startsWith(github.event.pull_request.head.ref, 'claude/docs-pipeline-'))
    runs-on: ubuntu-latest
    env:
      MAX_TASKS: 3 # 1回の実行で実装するタスク数の上限
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Guard - implementation plan exists
        id: plan
        run: |
          if [ ! -f docs/plan/実装計画.md ]; then
            echo "docs/plan/実装計画.md が存在しないためコード生成をスキップします"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 対象タスクの規模からモデルを決定
        id: model
        if: steps.plan.outputs.exists == 'true'
        run: |
          python3 - <<'PYEOF'
          import os, re

          max_tasks = int(os.environ.get("MAX_TASKS", "3"))
          with open("docs/plan/実装計画.md", encoding="utf-8") as f:
              text = f.read()

          blocks = re.findall(r'^###\s+TASK-\d+.*?(?=^###\s+TASK-\d+|\Z)', text, re.M | re.S)

          scales = []
          for block in blocks:
              status = re.search(r'ステータス:\s*(\S+)', block)
              scale = re.search(r'規模:\s*(\S+)', block)
              if status and status.group(1) == "未着手":
                  scales.append(scale.group(1) if scale else "中")
                  if len(scales) >= max_tasks:
                      break

          model = "claude-opus-4-8" if "大" in scales else "claude-sonnet-5"
          print(f"対象タスクの規模: {scales or '不明'} -> モデル: {model}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"model={model}\n")
          PYEOF

      - name: 実装計画に従ったコード生成
        if: steps.plan.outputs.exists == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          # タスクIssueの作成・PR作成の両方でgh CLIを使うため、
          # GITHUB_TOKENでのPR作成が許可されていない場合に備えてPATをフォールバックにする。
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN || github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model ${{ steps.model.outputs.model }}
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(yarn:*),Bash(pnpm:*),Bash(npx:*)"
          prompt: |
            .github/claude/prompts/generate-code.md を読み、その指示に従って作業すること。
            環境変数: MAX_TASKS=${{ env.MAX_TASKS }}
            共通ルール:
            - リポジトリにCLAUDE.mdや開発ガイドが存在する場合はそれに従う。
            - 実装計画（docs/plan/実装計画.md）の範囲のみ実装する。
            - コミットメッセージはConventional Commits形式とする。
