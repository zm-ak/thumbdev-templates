name: Claude Code - Issue to PR

# Issue単位の実装を行う汎用ワークフロー。
#   - `claude-task` ラベル付きIssueの作成で自動起動
#     （plan-to-code が Claude Bot として作成した Issue も含む → allowed_bots 必須）
#   - Issueコメントで「@claude」とメンションすると起動
#   - `claude-resume` ラベルを付与すると、既存の作業ブランチと直前の「作業経過」コメントから再開する
#   - `@claude test` / `@claude security` / `@claude verify` は Pipeline Pro 専用のため除外する
#
# 再開の仕組み:
#   実装が完了しなかった場合でも、進行中の変更はコミット・pushされ、
#   Issueに「## 作業経過」コメントとして完了内容・次にやることが残る。
#   `claude-resume` ラベルの付与、または `@claude` コメントで再実行すると、
#   既存の作業ブランチをチェックアウトし、直前の作業経過から続きを実施する（最初からやり直さない）。
#
# コスト最適化:
#   - Issue本文の「規模: 小/中/大」を読み取り、規模に応じてモデルを切り替える
#     （大のみOpus、それ以外はSonnet）。実装計画のタスクはほとんどが小・中規模のため、
#     全タスクをOpus固定にするより大幅にコストを抑えられる。
#   - `issues.opened` と `issues.labeled` が同一Issueに対してほぼ同時に発火し、
#     二重起動することがあるため、Issue単位のconcurrency groupで後発を打ち切る。
#
# 必要な設定: ANTHROPIC_API_KEY（Actions Secret）、`claude-task` ラベル、`claude-resume` ラベル
# 任意の設定: REPO_ADMIN_TOKEN（repoスコープのPAT。GITHUB_TOKENでのPR作成が許可されない場合のフォールバック用）

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write

concurrency:
  group: claude-issue-to-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      (github.event_name == 'issues' &&
       (contains(github.event.issue.labels.*.name, 'claude-task') ||
        contains(github.event.issue.labels.*.name, 'claude-resume'))) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       !contains(github.event.comment.body, '@claude test') &&
       !contains(github.event.comment.body, '@claude security') &&
       !contains(github.event.comment.body, '@claude verify'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: タスク規模からモデルを決定
        id: model
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          SCALE=$(printf '%s\n' "$ISSUE_BODY" | grep -oP '(?<=規模:\s)(小|中|大)' | head -n1 || true)
          if [ "$SCALE" = "大" ]; then
            MODEL="claude-opus-4-8"
          else
            MODEL="claude-sonnet-5"
          fi
          echo "Issueの規模: ${SCALE:-不明（デフォルトSonnet）} -> モデル: $MODEL"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          # gh pr create 等のgh CLI操作を認証するために必要（未設定だとgh CLIが認証エラーになる）。
          # GITHUB_TOKENでのPR作成が許可されていない場合はREPO_ADMIN_TOKEN（repoスコープのPAT）をフォールバックに使う。
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN || github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # plan-to-code が Claude Bot として作成した Issue 起点を許可する
          allowed_bots: "claude"
          claude_args: >-
            --model ${{ steps.model.outputs.model }}
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(yarn:*),Bash(pnpm:*),Bash(npx:*)"
          prompt: |
            あなたはこのリポジトリの実装担当（Claude Code）です。
            以下のルールに従ってください。優先度は上から順です。

            1. リポジトリに CLAUDE.md や開発ガイド（docs/ 配下）が存在する場合は必ず読み、従うこと。
               ただし設計ドキュメントは、このIssueの対象範囲に関連する章のみで判断できる場合、
               全文を読み直す必要はない（再開時のトークン消費を抑えるため）。
            2. 実装対象は、このIssue（#${{ github.event.issue.number }}）に書かれた範囲のみとする。
               関係のないリファクタや整形は行わないこと。
            3. Issueの内容が曖昧、または設計ドキュメントと矛盾する場合は、実装を進めず
               Issueにコメントで質問を投稿して終了すること（推測で実装しない）。
            4. 実装が完了したら、package.json 等からこのリポジトリで利用可能な
               lint / typecheck / test コマンドを検出して実行し、エラーがあれば修正すること。
               ただし、変更がドキュメント（.md ファイル）のみの場合は省略してよい。
            5. ブランチ名は `feature/issue-${{ github.event.issue.number }}-<slug>` とする。
               作業開始前に `git ls-remote --heads origin` で同名パターンの
               ブランチが既に存在するか確認すること。
               - 存在する場合（前回の実行が途中で終了した再開のケース）:
                 そのブランチを `git fetch` してチェックアウトする（新規ブランチは作らない）。
                 既存のコミット履歴と、このIssueの最新の「## 作業経過」コメントを読み、
                 そこまでの内容を前提に続きから作業する。設計や実装済み部分をやり直さない。
                 実装済みファイルは `git show` / `git diff` で変更点を確認する程度に留め、
                 全文を読み直さない（再開のたびに毎回コンテキストを再構築するコストを抑えるため）。
               - 存在しない場合: 新規にブランチを作成する。
            6. コミットメッセージは Conventional Commits に従うこと（feat:, fix:, refactor: など）。
               実装がまとまった単位（ファイル群・機能単位）に分けられる場合は、
               完了するたびにコミットしてブランチをpushすること
               （最後まで気づかれずに失敗すると、pushされていない変更は失われるため）。
            7. 実装が完了したら Pull Request を作成すること（`gh pr create`）。
               .github/pull_request_template.md が存在する場合はその構成に沿うこと。
            8. PR本文には、変更内容・目的・確認内容・影響範囲と `Closes #${{ github.event.issue.number }}` を記載すること。
            9. 実装が完了しなかった場合（3. で質問を投稿した場合、エラーで続行できなくなった場合を含む）は、
               それまでの変更を必ずコミット・pushした上で、このIssueに
               「## 作業経過」から始まるコメントを投稿すること。内容は次の2点を箇条書きで含める。
               - 完了したこと
               - 次にやるべきこと（再開する担当者がゼロから読み直さなくて済む具体性で書く）
               人間が `claude-resume` ラベルを付与するか `@claude` とコメントすると、
               このワークフローが再度起動し、上記のブランチと作業経過をもとに続きから実行される。

            対象Issue:
            タイトル: ${{ github.event.issue.title }}
            ラベル: ${{ join(github.event.issue.labels.*.name, ', ') }}
            本文:
            ${{ github.event.issue.body }}
